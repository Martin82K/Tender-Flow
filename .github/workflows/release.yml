name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional: version to release (must match package.json)'
        required: false

permissions:
  contents: write # Required for creating/updating releases

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release version
        id: get_version
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="$(node -p "require('./package.json').version")"
          EVENT_NAME="${{ github.event_name }}"
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [ "$EVENT_NAME" = "push" ]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
              echo "::error::Tag version (${TAG_VERSION}) must match built app version (${APP_VERSION})."
              exit 1
            fi
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "$APP_VERSION" ]; then
            echo "::error::workflow_dispatch input version (${INPUT_VERSION}) must match package.json version (${APP_VERSION})."
            exit 1
          fi

          echo "VERSION=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using release version: $APP_VERSION"

      - name: Create or update release (without assets)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
          append_body: true
          body: |
            Assets are uploaded manually for this release.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
