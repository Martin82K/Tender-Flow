name: Build and Publish Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional: version to release (must match package.json)"
        required: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release version
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="$(node -p "require('./package.json').version")"
          EVENT_NAME="${{ github.event_name }}"
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [ "$EVENT_NAME" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            EXPECTED_TAG="v${APP_VERSION}"
            if [ "$TAG" != "$EXPECTED_TAG" ]; then
              echo "::error::Tag version (${TAG}) must match built app version (${APP_VERSION})."
              exit 1
            fi
          else
            if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "$APP_VERSION" ]; then
              echo "::error::workflow_dispatch input version (${INPUT_VERSION}) must match package.json version (${APP_VERSION})."
              exit 1
            fi
            TAG="v${APP_VERSION}"
          fi

          echo "version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using release version: ${APP_VERSION} (${TAG})"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.resolve.outputs.tag }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --title "$TAG" --notes "Automated desktop release assets."
          fi

  release-win:
    needs: prepare
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release artifacts
        run: npm run desktop:build:win

      - name: Validate Windows artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"

          INSTALLER_PATH="dist-electron/Tender-Flow-Setup-${VERSION}.exe"
          BLOCKMAP_PATH="${INSTALLER_PATH}.blockmap"
          LATEST_PATH="dist-electron/latest.yml"

          [ -f "$INSTALLER_PATH" ] || { echo "::error::Missing $INSTALLER_PATH"; exit 1; }
          [ -f "$BLOCKMAP_PATH" ] || { echo "::error::Missing $BLOCKMAP_PATH"; exit 1; }
          [ -f "$LATEST_PATH" ] || { echo "::error::Missing $LATEST_PATH"; exit 1; }

      - name: Upload Windows assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          gh release upload "$TAG" \
            "dist-electron/Tender-Flow-Setup-${VERSION}.exe" \
            "dist-electron/Tender-Flow-Setup-${VERSION}.exe.blockmap" \
            "dist-electron/latest.yml" \
            --clobber

  release-mac-arm64:
    needs:
      - prepare
      - release-win
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build macOS arm64 release artifacts
        run: npm run desktop:build:mac

      - name: Validate macOS arm64 artifacts
        id: validate_mac
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          VERSION="${{ needs.prepare.outputs.version }}"

          dmg=(dist-electron/*-${VERSION}-arm64.dmg)
          zip=(dist-electron/*-${VERSION}-arm64-mac.zip)
          blockmap=(dist-electron/*-${VERSION}-arm64-mac.zip.blockmap)
          latest="dist-electron/latest-mac.yml"

          [ ${#dmg[@]} -gt 0 ] || { echo "::error::Missing arm64 dmg artifact"; exit 1; }
          [ ${#zip[@]} -gt 0 ] || { echo "::error::Missing arm64 zip artifact"; exit 1; }
          [ ${#blockmap[@]} -gt 0 ] || { echo "::error::Missing arm64 zip blockmap artifact"; exit 1; }
          [ -f "$latest" ] || { echo "::error::Missing $latest"; exit 1; }

          echo "dmg=${dmg[0]}" >> "$GITHUB_OUTPUT"
          echo "zip=${zip[0]}" >> "$GITHUB_OUTPUT"
          echo "blockmap=${blockmap[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload macOS arm64 assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"

          gh release upload "$TAG" \
            "${{ steps.validate_mac.outputs.dmg }}" \
            "${{ steps.validate_mac.outputs.zip }}" \
            "${{ steps.validate_mac.outputs.blockmap }}" \
            "dist-electron/latest-mac.yml" \
            --clobber
