name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      # Safe dummy values for CI test/runtime init. Real secrets are not needed here.
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Verify root registry signatures
        run: npm audit signatures

      - name: Run test suite
        run: npm run test:run

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Check documentation links
        run: npm run check:docs

      - name: Check import boundaries
        run: npm run check:boundaries

      - name: Check legacy structure freeze
        run: npm run check:legacy-structure

      - name: Smoke build (web)
        run: npm run build

      - name: Install desktop dependencies from lockfile
        run: npm ci --prefix desktop --ignore-scripts

      - name: Smoke compile (desktop)
        run: npm run desktop:compile

      - name: Audit desktop dependencies
        run: npm audit --prefix desktop --audit-level=high

      - name: Verify desktop registry signatures
        run: npm audit signatures --prefix desktop
