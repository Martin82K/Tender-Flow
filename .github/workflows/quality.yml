name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      # Safe dummy values for CI test/runtime init. Real secrets are not needed here.
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm run test:run

      - name: Check import boundaries
        run: npm run check:boundaries

      - name: Check legacy structure freeze
        run: npm run check:legacy-structure

      - name: Smoke build (web)
        run: npm run build

      - name: Smoke compile (desktop)
        run: npm run desktop:compile
