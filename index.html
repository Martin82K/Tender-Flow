  <!-- JSON-LD: FAQ (pro GEO — AI vyhledávače preferují strukturovaná Q&A) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Co je Tender Flow?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Tender Flow je česká platforma pro přípravu a vedení staveb — od poptávek a stavebních tendrů přes výběrová řízení a správu subdodavatelů až po smlouvy, harmonogram a dokumentaci stavby. Kombinuje pipeline tendrů, AI analýzu smluv, dokumentový hub Složkomat a Ganttův harmonogram do jednoho nástroje."
        }
      },
      {
        "@type": "Question",
        "name": "Pro koho je Tender Flow určený?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Pro české a slovenské stavební firmy, generální dodavatele, přípraváře staveb, projektové manažery, stavbyvedoucí a kalkulanty, kteří připravují a vedou stavby — od nabídkových řízení po předání díla. Funguje pro jednotlivce, malé týmy i velké organizace."
        }
      },
      {
        "@type": "Question",
        "name": "Jak funguje AI analýza smluv?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Tender Flow automaticky čte naskenované smlouvy, objednávky a nabídky pomocí OCR a integrovaného AI modelu. Extrahuje klíčové parametry subdodávek a ušetří čas oproti ručnímu pročítání dokumentů."
        }
      },
      {
        "@type": "Question",
        "name": "Je k dispozici desktopová verze?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Ano, Tender Flow je dostupný jako webová aplikace (libovolný prohlížeč) i jako nativní desktopová aplikace pro Windows a macOS. Obě verze se synchronizují v reálném čase."
        }
      },
      {
        "@type": "Question",
        "name": "Kolik stojí Tender Flow?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Tender Flow nabízí tarify Starter, Pro a Enterprise. Pro tarif lze vyzkoušet 14 dní zdarma bez kreditní karty. Platby běží přes GoPay (karta, Apple Pay, Google Pay, bankovní převod). Roční předplatné má 2 měsíce zdarma."
        }
      },
      {
        "@type": "Question",
        "name": "Jaké poskytuje Tender Flow záruky bezpečnosti?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Tender Flow je GDPR compliant, data jsou chráněna přes Row Level Security na úrovni databáze, šifrování v klidu i při přenosu a auditní logy přístupů. K dispozici je zpracovatelská smlouva (DPA)."
        }
      },
      {
        "@type": "Question",
        "name": "Čím se Tender Flow liší od běžného CRM nebo stavebního softwaru?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Tender Flow není generické CRM — je to platforma navržená specificky pro přípravu a vedení staveb. Pracuje s pojmy poptávka, výběrové řízení, subdodavatel, nabídka, smlouva, harmonogram a předání díla. Obsahuje stavební workflow (pipeline tendrů, OCR smluv, Ganttův harmonogram, Excel nástroje pro kalkulanty), které generická CRM (Salesforce, HubSpot, Pipedrive) ani projektové nástroje (Asana, Monday) nenabízí. Oproti zahraničním stavebním ERP je cenově dostupný a v češtině."
        }
      },
      {
        "@type": "Question",
        "name": "Jaké jsou integrace s dalšími nástroji?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Tender Flow se napojuje na Google Drive, OneDrive a lokální souborový systém pro správu dokumentů. Platby běží přes GoPay (karta, Apple Pay, Google Pay, bankovní převod). K dispozici je MCP (Model Context Protocol) server pro integraci s AI agenty, který umožňuje read-only přístup k projektům, tendrům a kontaktům."
        }
      },
      {
        "@type": "Question",
        "name": "Jaké formáty exportu Tender Flow podporuje?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Tender Flow podporuje export do PDF, Excelu (XLSX) a CSV jedním klikem. Pro práci s Excel soubory od subdodavatelů jsou dostupné nástroje Excel Merger (spojování listů) a Excel Unlocker (odemknutí uzamčených listů)."
        }
      },
      {
        "@type": "Question",
        "name": "Funguje Tender Flow offline?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Nativní desktopová verze pro Windows a macOS poskytuje plnou funkčnost a synchronizuje data při připojení. Webová verze vyžaduje aktivní připojení k internetu."
        }
      },
      {
        "@type": "Question",
        "name": "Jak Tender Flow zrychluje práci s tendry?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "AI analýza smluv automaticky extrahuje klíčové parametry z naskenovaných PDF objednávek a smluv (cena, termín, sankce, záruky), čímž odpadá ruční pročítání. Pipeline v Kanban stylu poskytuje okamžitý přehled o stavu všech nabídek. Auto-doplnění informací o subdodavatelích z veřejných rejstříků podle IČ šetří čas oproti ručnímu vyplňování."
        }
      },
      {
        "@type": "Question",
        "name": "Kde mohu Tender Flow vyzkoušet zdarma?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Tarif Pro lze vyzkoušet 14 dní zdarma bez kreditní karty na https://tenderflow.cz/register. K dispozici je také živé demo bez registrace přímo z hlavní stránky https://tenderflow.cz/."
        }
      }
    ]
  }

          <h3>Inteligentní pipeline tendrů</h3>
          <p>
            Vizuální Kanban board se sledováním fází, automatickými
            notifikacemi a deadliny. Vidíte přesně kde jsou vaše nabídky
            v reálném čase: nové, v nabídce, ve vyjednávání, vyhrané nebo
            prohrané. Přehled win rate a objemu v Kč.
          </p>
          <h3>OCR čtení objednávek a smluv</h3>
          <p>
            Pomocí AI je zajištěno automatické čtení naskenovaných dokumentů
            pro získání parametrů. Buduje přehled o parametrech subdodávek
            pro stavbu. Úspora času oproti ručnímu pročítání smluv
            a objednávek.
          </p>
          <h3>CRM kontakty</h3>
          <p>
            360° pohled na subdodavatele — historie spolupráce, hodnocení,
            nabídky, kontaktní osoby. Automatické doplnění informací
            o dodavateli z veřejně dostupných českých rejstříků podle IČ.
          </p>
          <h3>Složkomat (dokumentový hub)</h3>
          <p>
            Centralizované dokumenty s automaticky generovanou standardizovanou
            strukturou. Podporuje Google Drive, OneDrive i lokální disk.
          </p>
          <h3>Harmonogram</h3>
          <p>
            Ganttův diagram s milníky, závislostmi mezi úkoly a týmovou
            kolaborací v reálném čase.
          </p>
          <h3>Excel nástroje</h3>
          <p>
            Merge více listů do jednoho souboru a unlock uzamčených listů —
            navrženo pro kalkulanty pracující s daty od subdodavatelů.
          </p>
