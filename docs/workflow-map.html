<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tender Flow workflow map</title>
    <link rel="icon" href="data:,">
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --paper: #ffffff;
        --ink: #162033;
        --muted: #667085;
        --line: #d7dde8;
        --line-strong: #7c8aa3;
        --accent: #0f766e;
        --accent-2: #2563eb;
        --danger: #be123c;
        --shadow: 0 18px 45px rgba(22, 32, 51, 0.08);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      button,
      input {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: grid;
        grid-template-columns: minmax(260px, 1fr) auto;
        gap: 24px;
        align-items: center;
        padding: 18px 24px;
        background: rgba(255, 255, 255, 0.94);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(16px);
      }

      .title-block h1 {
        margin: 0 0 4px;
        font-size: 22px;
        line-height: 1.2;
        font-weight: 750;
      }

      .title-block p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .top-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .search {
        width: 260px;
        min-width: 0;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 0 12px;
        background: #fff;
        color: var(--ink);
        outline: none;
      }

      .search:focus {
        border-color: var(--accent-2);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }

      .ghost-button {
        height: 38px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        color: var(--ink);
        padding: 0 12px;
        cursor: pointer;
      }

      .ghost-button:hover {
        border-color: var(--line-strong);
      }

      .workspace {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr) 380px;
        gap: 18px;
        padding: 18px;
        min-height: 0;
      }

      .panel {
        min-height: 0;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .sidebar,
      .details {
        overflow: auto;
      }

      .section-header {
        padding: 16px 16px 12px;
        border-bottom: 1px solid var(--line);
      }

      .section-header h2 {
        margin: 0;
        font-size: 14px;
        line-height: 1.25;
        font-weight: 750;
      }

      .section-header p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .flow-list {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .flow-button {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        color: var(--ink);
        padding: 11px 12px;
        text-align: left;
        cursor: pointer;
        transition: border-color 140ms ease, background 140ms ease, transform 140ms ease;
      }

      .flow-button:hover {
        border-color: var(--line-strong);
        transform: translateY(-1px);
      }

      .flow-button.active {
        border-color: rgba(15, 118, 110, 0.45);
        background: #ecfdf5;
      }

      .flow-button strong {
        display: block;
        font-size: 13px;
        line-height: 1.25;
        font-weight: 750;
      }

      .flow-button span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
      }

      .canvas-panel {
        position: relative;
        overflow: auto;
        background:
          linear-gradient(#edf1f7 1px, transparent 1px),
          linear-gradient(90deg, #edf1f7 1px, transparent 1px),
          #fbfcfe;
        background-size: 28px 28px;
      }

      .legend {
        position: sticky;
        top: 0;
        z-index: 12;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px;
        background: rgba(251, 252, 254, 0.92);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(12px);
      }

      .legend-item {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 9px;
        background: #fff;
        color: var(--muted);
        font-size: 11px;
      }

      .legend-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
      }

      .diagram-wrap {
        position: relative;
        min-width: 1640px;
        padding: 22px;
      }

      .diagram {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: repeat(8, minmax(170px, 1fr));
        grid-auto-rows: minmax(118px, auto);
        gap: 16px;
        min-height: 760px;
      }

      .edges {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      .node-card {
        position: relative;
        min-height: 118px;
        border: 1px solid var(--line);
        border-top: 4px solid var(--group-color);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.96);
        padding: 12px;
        box-shadow: 0 10px 24px rgba(22, 32, 51, 0.06);
        transition: opacity 140ms ease, border-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
      }

      .node-card.dimmed {
        opacity: 0.25;
      }

      .node-card.active {
        border-color: var(--group-color);
        box-shadow: 0 14px 34px rgba(15, 118, 110, 0.16);
        transform: translateY(-2px);
      }

      .node-card h3 {
        margin: 0 0 7px;
        font-size: 13px;
        line-height: 1.25;
        font-weight: 800;
      }

      .node-card p {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.4;
      }

      .node-paths {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 10px;
      }

      .path-chip,
      .risk-chip {
        display: inline-flex;
        max-width: 100%;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 7px;
        background: #f8fafc;
        color: #475569;
        font-size: 10px;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .risk-chip {
        border-color: rgba(190, 18, 60, 0.25);
        background: #fff1f2;
        color: var(--danger);
      }

      .details-body {
        padding: 16px;
      }

      .details h2,
      .details h3 {
        margin: 0;
      }

      .details h2 {
        font-size: 18px;
        line-height: 1.25;
      }

      .details h3 {
        margin-top: 18px;
        font-size: 13px;
        line-height: 1.25;
        font-weight: 800;
      }

      .summary {
        margin: 8px 0 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .meta-row {
        display: grid;
        grid-template-columns: 94px minmax(0, 1fr);
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid #eef2f7;
        font-size: 12px;
        line-height: 1.4;
      }

      .meta-row span:first-child {
        color: var(--muted);
      }

      .steps {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }

      .step-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        padding: 10px;
      }

      .step-title {
        display: grid;
        grid-template-columns: 22px minmax(0, 1fr);
        gap: 8px;
        align-items: start;
        font-size: 12px;
        font-weight: 750;
      }

      .step-index {
        display: inline-grid;
        width: 22px;
        height: 22px;
        place-items: center;
        border-radius: 999px;
        background: #e0f2fe;
        color: #0369a1;
        font-size: 11px;
      }

      .step-card p {
        margin: 8px 0 0 30px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .data-pill {
        display: block;
        margin: 8px 0 0 30px;
        border-radius: 6px;
        background: #f8fafc;
        border: 1px solid #eef2f7;
        padding: 7px;
        color: #334155;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 11px;
        line-height: 1.35;
      }

      .package-list {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .package-item {
        border-left: 3px solid var(--group-color);
        padding: 8px 10px;
        background: #f8fafc;
        border-radius: 6px;
      }

      .package-item strong {
        display: block;
        font-size: 12px;
      }

      .package-item span {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
      }

      .edge-line {
        stroke: rgba(100, 116, 139, 0.22);
        stroke-width: 2;
        fill: none;
      }

      .edge-line.active {
        stroke: var(--accent);
        stroke-width: 3.5;
        filter: drop-shadow(0 2px 4px rgba(15, 118, 110, 0.2));
      }

      .edge-label {
        opacity: 0;
        fill: #0f766e;
        font-size: 11px;
        font-weight: 750;
        paint-order: stroke;
        stroke: #ffffff;
        stroke-width: 4px;
        stroke-linejoin: round;
      }

      .edge-label.active {
        opacity: 1;
      }

      .empty-state,
      .error-state {
        padding: 18px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .error-state {
        color: var(--danger);
      }

      @media (max-width: 1180px) {
        .workspace {
          grid-template-columns: 280px minmax(0, 1fr);
        }

        .details {
          grid-column: 1 / -1;
          max-height: none;
        }
      }

      @media (max-width: 760px) {
        .topbar {
          grid-template-columns: 1fr;
          padding: 14px;
        }

        .top-actions {
          align-items: stretch;
          flex-direction: column;
        }

        .search,
        .ghost-button {
          width: 100%;
        }

        .workspace {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .diagram-wrap {
          min-width: 1220px;
        }

        .diagram {
          grid-template-columns: repeat(8, minmax(130px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="title-block">
          <h1>Tender Flow workflow map</h1>
          <p>Click a workflow to highlight package handoffs and see exactly what data moves between app layers.</p>
        </div>
        <div class="top-actions">
          <input id="flowSearch" class="search" type="search" placeholder="Filter workflows or packages">
          <button id="resetButton" class="ghost-button" type="button">Reset</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel sidebar" aria-label="Workflow actions">
          <div class="section-header">
            <h2>Actions</h2>
            <p>Workflow definitions are loaded from <code>workflow-flows.json</code>.</p>
          </div>
          <div id="flowList" class="flow-list"></div>
        </aside>

        <section class="panel canvas-panel" aria-label="Package diagram">
          <div id="legend" class="legend"></div>
          <div id="diagramWrap" class="diagram-wrap">
            <svg id="edges" class="edges" aria-hidden="true"></svg>
            <div id="diagram" class="diagram"></div>
          </div>
        </section>

        <aside class="panel details" aria-label="Workflow details">
          <div class="section-header">
            <h2 id="detailTitle">Select a workflow</h2>
            <p id="detailSubtitle">The selected action will annotate the active path and data handoffs.</p>
          </div>
          <div id="detailsBody" class="details-body"></div>
        </aside>
      </section>
    </main>

    <script>
      const DATA_URL = "workflow-flows.json";
      const groupColumns = {
        entry: 1,
        feature: 2,
        state: 4,
        data: 5,
        desktop: 6,
        server: 7,
        ops: 8,
        external: 8
      };
      const state = {
        data: null,
        activeFlowId: null,
        query: ""
      };

      const byId = (id) => document.getElementById(id);
      const text = (value) => (value == null ? "" : String(value));

      function createEl(tag, className, textValue) {
        const el = document.createElement(tag);
        if (className) el.className = className;
        if (textValue !== undefined) el.textContent = text(valueForText(textValue));
        return el;
      }

      function valueForText(value) {
        return value == null ? "" : String(value);
      }

      function setText(id, value) {
        const el = byId(id);
        if (el) el.textContent = text(value);
      }

      function groupBy(items, selector) {
        return items.reduce((acc, item) => {
          const key = selector(item);
          if (!acc[key]) acc[key] = [];
          acc[key].push(item);
          return acc;
        }, {});
      }

      function getGroup(groupId) {
        return state.data.groups.find((group) => group.id === groupId) || state.data.groups[0];
      }

      function getPackage(packageId) {
        return state.data.packages.find((pkg) => pkg.id === packageId);
      }

      function getActiveFlow() {
        return state.data.flows.find((flow) => flow.id === state.activeFlowId) || null;
      }

      function flowMatches(flow, query) {
        if (!query) return true;
        const haystack = [
          flow.label,
          flow.summary,
          flow.entryAction,
          ...(flow.aliases || []),
          ...flow.steps.flatMap((step) => [step.from, step.to, step.label, step.detail, step.data])
        ].join(" ").toLowerCase();
        return haystack.includes(query);
      }

      function packageMatches(pkg, query) {
        if (!query) return true;
        const haystack = [
          pkg.label,
          pkg.group,
          pkg.responsibility,
          pkg.security,
          ...(pkg.paths || [])
        ].join(" ").toLowerCase();
        return haystack.includes(query);
      }

      async function loadData() {
        try {
          const response = await fetch(DATA_URL, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Could not load ${DATA_URL}: ${response.status}`);
          }
          state.data = await response.json();
          const initialHash = window.location.hash.replace("#", "");
          state.activeFlowId = state.data.flows.some((flow) => flow.id === initialHash)
            ? initialHash
            : state.data.flows[0]?.id || null;
          render();
        } catch (error) {
          renderLoadError(error);
        }
      }

      function renderLoadError(error) {
        setText("detailTitle", "JSON load failed");
        setText("detailSubtitle", DATA_URL);
        byId("flowList").replaceChildren(createEl("div", "error-state", error.message));
        byId("diagram").replaceChildren(createEl("div", "error-state", "Serve this directory with a local static server so the page can fetch workflow-flows.json."));
        byId("detailsBody").replaceChildren(createEl("div", "error-state", "Example: python3 -m http.server 4177 --directory docs"));
      }

      function render() {
        renderLegend();
        renderFlowList();
        renderDiagram();
        renderDetails();
        requestAnimationFrame(drawEdges);
      }

      function renderLegend() {
        const legend = byId("legend");
        const children = state.data.groups.map((group) => {
          const item = createEl("span", "legend-item");
          const dot = createEl("span", "legend-dot");
          dot.style.backgroundColor = group.color;
          item.append(dot, document.createTextNode(group.label));
          return item;
        });
        legend.replaceChildren(...children);
      }

      function renderFlowList() {
        const query = state.query.trim().toLowerCase();
        const flows = state.data.flows.filter((flow) => flowMatches(flow, query));
        const items = flows.map((flow) => {
          const button = createEl("button", "flow-button");
          button.type = "button";
          button.classList.toggle("active", flow.id === state.activeFlowId);
          button.dataset.flowId = flow.id;

          const label = createEl("strong", null, flow.label);
          const summary = createEl("span", null, flow.summary);
          button.append(label, summary);
          button.addEventListener("click", () => {
            state.activeFlowId = flow.id;
            window.history.replaceState({}, "", `#${flow.id}`);
            render();
          });
          return button;
        });

        if (!items.length) {
          items.push(createEl("div", "empty-state", "No workflow matches the current filter."));
        }

        byId("flowList").replaceChildren(...items);
      }

      function renderDiagram() {
        const diagram = byId("diagram");
        const query = state.query.trim().toLowerCase();
        const activeFlow = getActiveFlow();
        const activeNodes = new Set();
        if (activeFlow) {
          activeFlow.steps.forEach((step) => {
            activeNodes.add(step.from);
            activeNodes.add(step.to);
          });
        }

        const packagesByGroup = groupBy(state.data.packages, (pkg) => pkg.group);
        const rowOffsets = {};
        const cards = [];

        state.data.groups.forEach((group) => {
          const packages = packagesByGroup[group.id] || [];
          packages.forEach((pkg, index) => {
            const card = createEl("article", "node-card");
            const column = groupColumns[pkg.group] || 1;
            rowOffsets[column] = rowOffsets[column] || 1;
            const row = rowOffsets[column]++;
            card.id = `node-${pkg.id}`;
            card.dataset.packageId = pkg.id;
            card.style.setProperty("--group-color", getGroup(pkg.group).color);
            card.style.gridColumn = String(column);
            card.style.gridRow = String(row);

            const matches = packageMatches(pkg, query);
            const isActive = activeNodes.has(pkg.id);
            card.classList.toggle("active", isActive);
            card.classList.toggle("dimmed", Boolean(activeFlow) && !isActive);
            card.hidden = Boolean(query) && !matches && !isActive;

            const title = createEl("h3", null, pkg.label);
            const responsibility = createEl("p", null, pkg.responsibility);
            const paths = createEl("div", "node-paths");
            (pkg.paths || []).slice(0, 3).forEach((path) => {
              paths.append(createEl("span", "path-chip", path));
            });
            card.append(title, responsibility, paths);
            card.addEventListener("click", () => renderPackageDetails(pkg.id));
            cards.push(card);
          });
        });

        diagram.replaceChildren(...cards);
      }

      function getVisibleNodePoint(packageId) {
        const node = byId(`node-${packageId}`);
        const wrap = byId("diagramWrap");
        if (!node || node.hidden) return null;
        const nodeBox = node.getBoundingClientRect();
        const wrapBox = wrap.getBoundingClientRect();
        return {
          x: nodeBox.left - wrapBox.left + wrap.scrollLeft + nodeBox.width / 2,
          y: nodeBox.top - wrapBox.top + wrap.scrollTop + nodeBox.height / 2
        };
      }

      function drawEdges() {
        const svg = byId("edges");
        const wrap = byId("diagramWrap");
        const activeFlow = getActiveFlow();
        const steps = activeFlow?.steps || [];
        svg.setAttribute("width", String(wrap.scrollWidth));
        svg.setAttribute("height", String(wrap.scrollHeight));
        svg.setAttribute("viewBox", `0 0 ${wrap.scrollWidth} ${wrap.scrollHeight}`);

        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
        marker.setAttribute("id", "arrow-active");
        marker.setAttribute("markerWidth", "10");
        marker.setAttribute("markerHeight", "10");
        marker.setAttribute("refX", "9");
        marker.setAttribute("refY", "3");
        marker.setAttribute("orient", "auto");
        marker.setAttribute("markerUnits", "strokeWidth");
        const markerPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
        markerPath.setAttribute("d", "M0,0 L0,6 L9,3 z");
        markerPath.setAttribute("fill", "#0f766e");
        marker.append(markerPath);
        defs.append(marker);

        const edgeEls = [defs];
        steps.forEach((step, index) => {
          const from = getVisibleNodePoint(step.from);
          const to = getVisibleNodePoint(step.to);
          if (!from || !to) return;

          const dx = Math.max(40, Math.abs(to.x - from.x) * 0.45);
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("class", "edge-line active");
          path.setAttribute("d", `M${from.x},${from.y} C${from.x + dx},${from.y} ${to.x - dx},${to.y} ${to.x},${to.y}`);
          path.setAttribute("marker-end", "url(#arrow-active)");

          const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
          label.setAttribute("class", "edge-label active");
          label.setAttribute("x", String((from.x + to.x) / 2));
          label.setAttribute("y", String((from.y + to.y) / 2 - 8 - (index % 2) * 13));
          label.setAttribute("text-anchor", "middle");
          label.textContent = step.label;

          edgeEls.push(path, label);
        });

        svg.replaceChildren(...edgeEls);
      }

      function renderDetails() {
        const flow = getActiveFlow();
        if (!flow) {
          setText("detailTitle", "Select a workflow");
          setText("detailSubtitle", "No active workflow.");
          byId("detailsBody").replaceChildren();
          return;
        }

        setText("detailTitle", flow.label);
        setText("detailSubtitle", flow.summary);

        const body = byId("detailsBody");
        const intro = createEl("p", "summary", flow.summary);
        const risk = createEl("span", "risk-chip", flow.risk);

        const actionRow = createMetaRow("Entry", flow.entryAction);
        const sourceRow = createMetaRow("Data file", DATA_URL);
        const riskRow = createEl("div", "meta-row");
        riskRow.append(createEl("span", null, "Risk"), risk);

        const stepsTitle = createEl("h3", null, "Annotated handoffs");
        const steps = createEl("div", "steps");
        flow.steps.forEach((step, index) => {
          const card = createEl("div", "step-card");
          const title = createEl("div", "step-title");
          title.append(
            createEl("span", "step-index", String(index + 1)),
            createEl("span", null, `${labelFor(step.from)} -> ${labelFor(step.to)}: ${step.label}`)
          );
          card.append(
            title,
            createEl("p", null, step.detail),
            createEl("code", "data-pill", step.data)
          );
          steps.append(card);
        });

        const packagesTitle = createEl("h3", null, "Packages in this flow");
        const packages = createEl("div", "package-list");
        const packageIds = Array.from(new Set(flow.steps.flatMap((step) => [step.from, step.to])));
        packageIds.forEach((packageId) => {
          const pkg = getPackage(packageId);
          if (!pkg) return;
          packages.append(createPackageItem(pkg));
        });

        body.replaceChildren(intro, actionRow, riskRow, sourceRow, stepsTitle, steps, packagesTitle, packages);
      }

      function renderPackageDetails(packageId) {
        const pkg = getPackage(packageId);
        if (!pkg) return;
        const group = getGroup(pkg.group);
        setText("detailTitle", pkg.label);
        setText("detailSubtitle", group.label);

        const body = byId("detailsBody");
        const responsibility = createEl("p", "summary", pkg.responsibility);
        const security = createMetaRow("Security", pkg.security);
        const pathsTitle = createEl("h3", null, "Paths");
        const paths = createEl("div", "package-list");
        (pkg.paths || []).forEach((path) => {
          const item = createEl("div", "package-item");
          item.style.setProperty("--group-color", group.color);
          item.append(createEl("strong", null, path));
          paths.append(item);
        });

        const flowsTitle = createEl("h3", null, "Workflows using this package");
        const flows = createEl("div", "flow-list");
        state.data.flows
          .filter((flow) => flow.steps.some((step) => step.from === packageId || step.to === packageId))
          .forEach((flow) => {
            const button = createEl("button", "flow-button");
            button.type = "button";
            button.append(createEl("strong", null, flow.label), createEl("span", null, flow.summary));
            button.addEventListener("click", () => {
              state.activeFlowId = flow.id;
              window.history.replaceState({}, "", `#${flow.id}`);
              render();
            });
            flows.append(button);
          });

        body.replaceChildren(responsibility, security, pathsTitle, paths, flowsTitle, flows);
      }

      function createMetaRow(label, value) {
        const row = createEl("div", "meta-row");
        row.append(createEl("span", null, label), createEl("span", null, value));
        return row;
      }

      function createPackageItem(pkg) {
        const group = getGroup(pkg.group);
        const item = createEl("div", "package-item");
        item.style.setProperty("--group-color", group.color);
        item.append(createEl("strong", null, pkg.label), createEl("span", null, pkg.responsibility));
        return item;
      }

      function labelFor(packageId) {
        return getPackage(packageId)?.label || packageId;
      }

      byId("flowSearch").addEventListener("input", (event) => {
        state.query = event.currentTarget.value.toLowerCase();
        render();
      });

      byId("resetButton").addEventListener("click", () => {
        state.query = "";
        byId("flowSearch").value = "";
        state.activeFlowId = state.data?.flows[0]?.id || null;
        window.history.replaceState({}, "", window.location.pathname);
        render();
      });

      window.addEventListener("resize", () => requestAnimationFrame(drawEdges));
      loadData();
    </script>
  </body>
</html>
